<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>TO DO LIST</title>
    <link rel="stylesheet" href="index.css">
</head>

<body class=" min-h-screen ">
    
    <div class="video">
        <video autoplay loop muted class=" max-w-screen min-h-screen h-[calc(100dvh-2px)] w-full  object-cover -z-2">
            <source src="../videos_imgs/video1.mp4" type="video/mp4">
        </video>
    </div>
    <section class="absolute top-[58px]  z-10 flex flex-col  w-full gap-[50px] mx-auto  ">
        <div
            class="bg-[#D9D9D980] backdrop-blur-[32px]  rounded-[85px] border-[1px] border-[#FFFFFFB2] backdrop-blur-[32px] max-w-[436px] h-[93px] w-full mx-auto">
            <div style="font-family: 'Baloo','cursive'; "
                class=" max-w-[293px] w-full text-center mx-auto py-3">
                <p
                    class="text-[64px] bg-gradient-to-r from-[#C4564D] to-[#864B49] bg-clip-text text-transparent tracking-[0]  leading-[100%] font-weigt:normal ">
                    To-Do List</p>
            </div>
        </div>
        <div class=" flex items-center justify-center gap-[50px]  ">
            <input name="" id="taskInput" autofocus
                class="max-w-[622px] w-full  text-[40px] pt-[5px] px-2   bg-[#C4BABA5E] border-[#FFFFFFB2] border-[1px] backdrop-blur-[32px]"></input>
            <button>
                <img id="addBtn" src="../videos_imgs/img 1.png" alt="button" class="cursor-pointer" >
            </button>
            <select id="filterSelect"
                class=" max-w-[250px] w-full appearance-none  bg-[#C4BABA5E] backdrop-blur-[32px] border-[#FFFFFFB2] border-[1px] rounded-[2px] p-6 text-[24px] text-white font-weight-400">
                <option class=" text-black ">ALL</option>
                <option class=" text-black">Completed</option>
                <option class=" text-black">Pending</option>
            </select>
            <div class="pointer-events-none absolute ml-[990px] flex items-center">
                <img src="../videos_imgs/img 2.png" alt="dropdown" class="max-w-6 w-full">
            </div>
        </div>
        <div id="taskList" class="flex flex-col  gap-[20px] ml-[-280px] h-[calc(100vh-380px)] overflow-y-auto   scrollbar-thin  ">
            </div>
    </section> 
    <div class="flex  absolute bottom-[24px] right-[111px]  ">
        <img src="../videos_imgs/img 5.png" alt="logo" class="max-w-[43px] h-[43px] w-full ">
        <p class="text-[32px] font-weight-400 style text-decoration: underline text-white">POMODORO</p>
        <img src="../videos_imgs/img 6.png" alt="logo" class="max-w-[65px] w-full  bottom-[18px]">
    </div>

    <script src="index.js"></script>
</body>
