<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Baloo&display=swap" rel="stylesheet">
    <title>TO DO LIST</title>
</head>

<body class="relative min-h-screen  max-w-screen w-full">
    
    <div class="video">
        <video autoplay loop muted class="  w-full min-h-screen object-cover -z-2">
            <source src="../videos_imgs/video1.mp4" type="video/mp4">
        </video>
    </div>
    <section class="absolute top-[58px]  z-10 flex flex-col  w-full gap-[50px] mx-auto  ">
        <div
            class="bg-[#D9D9D980] backdrop-blur-[32px]  rounded-[85px] border-[1px] border-[#FFFFFFB2] backdrop-blur-[32px] max-w-[436px] h-[93px] w-full mx-auto">
            <div style="font-family: 'Baloo','cursive'; "
                class=" flex justify-center items-center max-w-[293px] h-[101px] w-full absolute left-[63px]  ">
                <p
                    class="text-[64px] bg-gradient-to-r from-[#C4564D] to-[#864B49] bg-clip-text text-transparent   leading-[100%] font-weigt:normal ">
                    To-Do List</p>
            </div>
        </div>
        <div class=" flex items-center justify-center gap-[50px]  ">
            <textarea name="" id=""
                class="max-w-[622px] w-full h-[83px]  bg-[#C4BABA5E] border-[#FFFFFFB2] border-[1px] backdrop-blur-[32px]"></textarea>
            <button>
                <img id="add-text" src="../videos_imgs/img 1.png" alt="button" class="cursor-pointer" >
            </button>
            <select
                class=" max-w-[250px] w-full appearance-none  bg-[#C4BABA5E] backdrop-blur-[32px] border-[#FFFFFFB2] border-[1px] rounded-[2px] p-6 text-[24px] text-white font-weight-400">
                <option class=" text-black ">ALL</option>
                <option class=" text-black">Completed</option>
                <option class=" text-black">Pending</option>
            </select>
            <div class="pointer-events-none absolute ml-[990px] flex items-center">
                <img src="../videos_imgs/img 2.png" alt="dropdown" class="w-8 h-8">
            </div>
        </div>
        <div class="flex flex-col gap-[20px] ml-[-280px]">
            <div
                class="bg-[#C4BABA40] flex border-[1px] max-w-[735px] w-full  rounded-[85px] justify-between px-[33px]  h-[78px] mx-auto ">
                <p id="task1" class="text-white text-[40px] font-normal "> Go for a walking </p>
                <div class="flex gap-[10px] justify-center items-center ">
                    <img id="icon1" src="../videos_imgs/img 3 (repeat).png" alt="check" class="max-w-[50px] w-full h-[50px] cursor-pointer ">
                    <img src="../videos_imgs/img 4 (repeat).png" alt="delete" class=" max-w-[50px] w-full h-[50px] cursor-pointer ">
                </div>
            </div>
            <div
                class="bg-[#C4BABA40] flex border-[1px] max-w-[735px] w-full rounded-[85px] justify-between px-[33px]  h-[78px] mx-auto">
                <p id="task2" class="text-white text-[40px] font-normal "> Do homework </p>
                <div class="flex gap-[10px] justify-center items-center ">
                    <img id="icon2" src="../videos_imgs/img 3 (repeat).png" alt="check" class="max-w-[50px] w-full h-[50px] cursor-pointer">
                    <img src="../videos_imgs/img 4 (repeat).png" alt="delete" class=" max-w-[50px] w-full h-[50px] cursor-pointer ">
                </div>
            </div>
            <div
                class="bg-[#C4BABA40] flex border-[1px] max-w-[735px] w-full rounded-[85px] justify-between px-[33px]  h-[78px] mx-auto">
                <p id="task3" class="text-white text-[40px] font-normal "> Plan the party </p>
                <div class="flex gap-[10px] justify-center items-center ">
                    <img id="icon3" src="../videos_imgs/img 3 (repeat).png" alt="check" class="max-w-[50px] w-full h-[50px] cursor-pointer">
                    <img src="../videos_imgs/img 4 (repeat).png" alt="delete" class=" max-w-[50px] w-full h-[50px] cursor-pointer ">
                </div>
            </div>
        </div>
    </section>
    <div class="flex  absolute bottom-[24px] right-[111px] ">
        <img src="../videos_imgs/img 5.png" alt="logo" class="max-w-[30px] w-full h-[38px]">
        <p class="text-[32px] font-weight-400 style text-decoration: underline text-white">POMODORO</p>
        <img src="../videos_imgs/img 6.png" alt="logo" class="max-w-[65px] w-full h-[50px] bottom-[18px]">
    </div>

    <script src="index.js"></script>
</body>
